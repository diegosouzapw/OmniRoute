# ──────────────────────────────────────────────────────────────────────
#  OmniRoute — Docker Compose (Production)
# ──────────────────────────────────────────────────────────────────────
#
#  Production instance on port 20128. Uses runner-web target for
#  web-cookie providers (gemini-web, claude-web).
#
#  Usage:
#    docker compose -f docker-compose.prod.yml up -d --build
#    docker compose -f docker-compose.prod.yml down
#    docker compose -f docker-compose.prod.yml logs -f
# ──────────────────────────────────────────────────────────────────────

services:
  # ── Redis (Rate Limiter Backend) ──────────────────────────────────
  redis:
    image: redis:8.6.2-alpine
    container_name: omniroute-redis-prod
    restart: unless-stopped
    volumes:
      - redis-prod-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  omniroute-prod:
    container_name: omniroute-prod
    depends_on:
      redis:
        condition: service_healthy
    build:
      context: .
      target: runner-base
    image: omniroute:prod
    restart: unless-stopped
    stop_grace_period: 40s
    env_file: .env.docker-prod
    environment:
      - NODE_ENV=production
      - PORT=20128
      - HOSTNAME=0.0.0.0
      - DATA_DIR=/app/data
    ports:
      - "20128:20128"
    volumes:
      - /home/openclaw/.omniroute:/app/data
    healthcheck:
      test: ["CMD", "node", "healthcheck.mjs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  redis-prod-data:
    name: redis-prod-data
