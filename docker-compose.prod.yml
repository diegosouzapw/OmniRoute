# ──────────────────────────────────────────────────────────────────────
#  OmniRoute — Docker Compose (Production Snapshot)
# ──────────────────────────────────────────────────────────────────────
#
#  Production instance ready for GHCR images and VPS updates.
#
#  Usage:
#    docker compose -f docker-compose.prod.yml pull
#    docker compose -f docker-compose.prod.yml up -d
#    docker compose -f docker-compose.prod.yml down
#    docker compose -f docker-compose.prod.yml logs -f
# ──────────────────────────────────────────────────────────────────────

services:
  omniroute-prod:
    container_name: omniroute-prod
    image: ${OMNIROUTE_IMAGE:-ghcr.io/rafacpti23/omniroute}:${OMNIROUTE_IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    stop_grace_period: 40s
    env_file: .env
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=${OMNIROUTE_MEMORY_MB:-768}
      - PORT=${PORT:-20128}
      - DASHBOARD_PORT=${DASHBOARD_PORT:-${PORT:-20128}}
      - API_PORT=${API_PORT:-20129}
      - API_HOST=${API_HOST:-0.0.0.0}
      - HOSTNAME=0.0.0.0
      - DATA_DIR=/app/data
      - APP_LOG_TO_FILE=${APP_LOG_TO_FILE:-true}
      - APP_LOG_FILE_PATH=${APP_LOG_FILE_PATH:-/app/data/logs/application/app.log}
      - APP_LOG_MAX_FILE_SIZE=${APP_LOG_MAX_FILE_SIZE:-50M}
      - APP_LOG_RETENTION_DAYS=${APP_LOG_RETENTION_DAYS:-7}
      - APP_LOG_MAX_FILES=${APP_LOG_MAX_FILES:-10}
      - CALL_LOG_RETENTION_DAYS=${CALL_LOG_RETENTION_DAYS:-30}
      - CALL_LOGS_TABLE_MAX_ROWS=${CALL_LOGS_TABLE_MAX_ROWS:-100000}
      - PROXY_LOGS_TABLE_MAX_ROWS=${PROXY_LOGS_TABLE_MAX_ROWS:-50000}
      - DB_BACKUP_MAX_FILES=${DB_BACKUP_MAX_FILES:-10}
      - DB_BACKUP_RETENTION_DAYS=${DB_BACKUP_RETENTION_DAYS:-7}
      - OMNIROUTE_DB_HEALTHCHECK_INTERVAL_MS=${OMNIROUTE_DB_HEALTHCHECK_INTERVAL_MS:-21600000}
    mem_limit: ${OMNIROUTE_CONTAINER_MEMORY:-1536m}
    memswap_limit: ${OMNIROUTE_CONTAINER_MEMORY_SWAP:-1536m}
    ports:
      - "${PROD_DASHBOARD_PORT:-20130}:${DASHBOARD_PORT:-${PORT:-20128}}"
      - "${PROD_API_PORT:-20131}:${API_PORT:-20129}"
    volumes:
      - omniroute-prod-data:/app/data
    logging:
      driver: json-file
      options:
        max-size: ${DOCKER_LOG_MAX_SIZE:-20m}
        max-file: "${DOCKER_LOG_MAX_FILES:-5}"
    healthcheck:
      test: ["CMD", "node", "healthcheck.mjs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  omniroute-prod-data:
    name: omniroute-prod-data
