schema: spec-driven

# プロジェクト文脈（任意）
# artifact 作成時に AI へ渡されます。
# 技術スタック、規約、スタイルガイド、ドメイン知識などを追加します。
context: |
  言語：日本語
  すべての成果物は日本語で作成してください。

  この OpenSpec/OPSX ワークスペースでは、ユーザー向けの説明、提案、設計、
  タスク、仕様差分は日本語で書く。

  OmniRoute は、複数の LLM プロバイダーを単一の OpenAI 互換エンドポイントへ
  ルーティングする AI gateway / proxy である。変更提案では、既存の
  `AGENTS.md` にあるドキュメント正確性ルールを守り、API 名、endpoint、
  環境変数、ファイル数、provider 数などの具体的な主張は実ファイルで確認する。

  実装名、コード識別子、ファイルパス、コマンド、HTTP endpoint、環境変数名は
  原文どおり英語で保持し、説明文だけを日本語にする。

# artifact ごとのルール（任意）
# artifact 種別ごとの追加ルールを定義します。
rules:
  proposal:
    - 見出しと本文は日本語で書く。
    - 既存挙動を変えない範囲、非目標、影響範囲を明確にする。
    - 未確認の endpoint、API 名、環境変数、provider 名を断定しない。
  design:
    - 設計判断、代替案、リスク、検証方法を日本語で説明する。
    - コード識別子、ファイルパス、protocol 名、model/provider ID は英語のまま保持する。
  tasks:
    - タスクは日本語で、実装と検証が追跡できる単位に分割する。
    - 可能な限り、各タスクに対象ファイルまたは検証コマンドを添える。
  specs:
    - 要件文は日本語で書く。
    - MUST/SHOULD などの規範語は必要に応じて英語のまま使ってよい。
