name: Sync Fork

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/diegosouzapw/OmniRoute.git
          git fetch upstream main
          git merge upstream/main --no-edit
          git push origin main
