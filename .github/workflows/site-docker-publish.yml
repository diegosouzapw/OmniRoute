name: Publish Easy IA Site Image

on:
  push:
    branches:
      - prod
    paths:
      - "site/**"
      - ".github/workflows/site-docker-publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: site-docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: Build and push Easy IA site image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/easy-ia-site
          tags: |
            type=raw,value=latest
            type=raw,value=prod
            type=sha,prefix=sha-

      - name: Build and push amd64 image
        uses: docker/build-push-action@v7
        with:
          context: ./site
          file: ./site/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=easy-ia-site
          cache-to: type=gha,mode=max,scope=easy-ia-site
