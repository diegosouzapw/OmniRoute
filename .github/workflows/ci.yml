name: ci

on:
  push:
    branches: [main, feat/**, phase-*]
  pull_request:
    branches: [main, feat/**, phase-*]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (oxlint)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    name: Unit + component tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: bun test

  build-web:
    name: Build web (SvelteKit)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: cd apps/web && bunx svelte-kit sync && bun run build

  build-bff:
    name: Build BFF (Hono)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: cd apps/bff && bun run build

  build-desktop:
    name: Cargo check (Tauri 2)
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - uses: dtolnay/rust-toolchain@stable
      - run: bun install --frozen-lockfile
      - run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml

  build-desktop-linux:
    name: Cargo check (Tauri 2, Linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - uses: dtolnay/rust-toolchain@stable
      - run: bun install --frozen-lockfile
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml

  build-desktop-windows:
    name: Cargo check (Tauri 2, Windows)
    runs-on: windows-2022
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - uses: dtolnay/rust-toolchain@stable
      - run: bun install --frozen-lockfile
      - run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml

  size-budget:
    name: Bundle size budget
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [build-web, build-bff]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: bunx size-limit

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [build-web, build-bff]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - run: bun run test:e2e
