name: ci

on:
  push:
    branches: [main, feat/**, phase-*]
  pull_request:
    branches: [main, feat/**, phase-*]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (oxlint)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    name: Unit + component tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: bun test

  build-web:
    name: Build web (SvelteKit)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: cd apps/web && bunx svelte-kit sync && bun run build

  build-bff:
    name: Build BFF (Hono)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: cd apps/bff && bun run build

  build-desktop:
    name: Cargo check (Tauri 2)
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - uses: dtolnay/rust-toolchain@stable
      - run: bun install --frozen-lockfile
      - run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml

  build-desktop-linux:
    name: Cargo check (Tauri 2, Linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - uses: dtolnay/rust-toolchain@stable
      - run: bun install --frozen-lockfile
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml

  build-desktop-windows:
    name: Cargo check (Tauri 2, Windows)
    runs-on: windows-2022
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - uses: dtolnay/rust-toolchain@stable
      - run: bun install --frozen-lockfile
      - run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml

  size-budget:
    name: Bundle size budget
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [build-web, build-bff]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: bunx size-limit

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [build-web, build-bff]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - run: bun run test:e2e

  a11y:
    name: a11y (axe-core)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [build-web, build-bff]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: cd apps/web && bunx svelte-kit sync && bun run build
      - run: cd apps/bff && bun run build
      - run: bunx playwright install --with-deps chromium
      - run: bunx playwright test tests/a11y/

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [build-web]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - run: cd apps/web && bunx svelte-kit sync && bun run build
      - run: cd apps/web && bun run preview &
      - run: sleep 5
      - run: bunx lhci autorun

  release-macos:
    name: Release macOS (sign + notarize)
    runs-on: macos-14
    timeout-minutes: 30
    needs: [build-web, build-bff, build-desktop, a11y]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.11 }
      - uses: dtolnay/rust-toolchain@stable
      - run: bun install --frozen-lockfile
      - uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      - name: Build signed DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd apps/desktop
          cargo tauri build --target aarch64-apple-darwin --target x86_64-apple-darwin
          ./scripts/notarize.sh src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/OmniRoute_0.1.0_aarch64.dmg
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

  release-windows:
    name: Release Windows (Azure Trusted Signing)
    runs-on: windows-2022
    timeout-minutes: 30
    needs: [build-web, build-bff, build-desktop, a11y]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.11 }
      - uses: dtolnay/rust-toolchain@stable
      - env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: cargo tauri build
      - uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/src-tauri/target/release/bundle/{msi,nsis}/*

  release-linux:
    name: Release Linux (.deb, .rpm, AppImage, Tauri updater)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: [build-web, build-bff, build-desktop, a11y]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.11 }
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - run: cargo tauri build
      - uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/src-tauri/target/release/bundle/{deb,rpm,appimage}/*
