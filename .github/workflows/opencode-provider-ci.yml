name: opencode-provider CI

on:
  push:
    branches: [main, release/v3.8.0]
    paths:
      - "@omniroute/opencode-provider/**"
  pull_request:
    branches: [main, release/v3.8.0]
    paths:
      - "@omniroute/opencode-provider/**"
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
permissions:
  contents: read


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
defaults:
  run:
    working-directory: "@omniroute/opencode-provider"

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22", "24"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: "@omniroute/opencode-provider/package-lock.json"
      - run: npm ci
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: "@omniroute/opencode-provider/package-lock.json"
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: opencode-provider-dist
          path: "@omniroute/opencode-provider/dist"
          retention-days: 7
