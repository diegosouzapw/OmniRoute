name: Deploy Homelab

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy. Defaults to the workflow commit SHA."
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/podporaonline-cz/omniroute

jobs:
  build:
    name: Build and push image
    runs-on: [self-hosted, linux, x64, gh-aw, omniroute, homelab]
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v6

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then TAG="${GITHUB_SHA}"; fi
          echo "image=${IMAGE_NAME}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
