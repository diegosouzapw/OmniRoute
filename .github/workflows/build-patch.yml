name: Build patched image (jcm fork)

# Builds and publishes a patched OmniRoute image to GHCR whenever a tag of the
# form `jcm-patch-vX.Y.Z` is pushed, or on manual dispatch with a version input.
# Patched images are tagged `ghcr.io/jmengit/omniroute:<version>-jcm<patch>`.

on:
  push:
    tags:
      - "jcm-patch-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Source version tag (e.g. 3.8.45)"
        required: true
        type: string
      patch:
        description: "Patch suffix (default 1)"
        required: false
        type: string
        default: "1"

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push (linux/amd64)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/jmengit/omniroute
    steps:
      - name: Resolve tags
        id: tags
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            REF="${GITHUB_REF_NAME}"
            VERSION="${REF#jcm-patch-v}"
            PATCH="1"
          else
            VERSION="${{ inputs.version }}"
            PATCH="${{ inputs.patch }}"
          fi
          TAG="${VERSION}-jcm${PATCH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "patch=${PATCH}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "source_ref=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Checkout (pinned to source version)
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          ref: ${{ steps.tags.outputs.source_ref }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push patched image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runner-base
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.tag }}
            ${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
