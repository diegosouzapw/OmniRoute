name: Cross-Platform Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cross-platform-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  JWT_SECRET: ci-cross-secret-with-sufficient-length-for-validation
  API_KEY_SECRET: ci-cross-api-key-secret
  DISABLE_SQLITE_AUTO_BACKUP: "true"

jobs:
  build-cli:
    name: CLI Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["24"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Check Node runtime
        run: npm run check:node-runtime
      - name: Build CLI
        run: npm run build:cli
      - name: Assert server.js exists
        run: test -f dist/server.js || (echo "dist/server.js missing" && exit 1)
        shell: bash

  test-unit:
    name: Unit Tests (${{ matrix.os }})
    needs: build-cli
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ["24"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Run unit tests
        run: node --import tsx --import ./tests/_setup/isolateDataDir.ts --test --test-force-exit --test-concurrency=4 tests/unit/*.test.ts
        env:
          JWT_SECRET: ci-cross-test-secret
          API_KEY_SECRET: ci-cross-test-api-key
