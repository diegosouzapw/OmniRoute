name: Publish GPT-5.6 Responses-Lite Hotfix

on:
  push:
    branches:
      - dev/gpt56-responses-lite-hotfix
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-gpt56-responses-lite-hotfix
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/jxnlexn/omniroute

jobs:
  build:
    name: Build and publish linux/amd64 image
    if: github.repository == 'JxnLexn/OmniRoute'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push hotfix image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          target: runner-base
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:gpt56-responses-lite
            ${{ env.IMAGE_NAME }}:gpt56-responses-lite-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=Temporary GPT-5.6 Responses-Lite compatibility hotfix
          cache-from: type=gha,scope=gpt56-responses-lite-amd64
          cache-to: type=gha,scope=gpt56-responses-lite-amd64,mode=max
