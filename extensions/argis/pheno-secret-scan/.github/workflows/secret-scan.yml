name: secret-scan

# ---------------------------------------------------------------------------
# pheno-secret-scan — canonical TruffleHog secret-scanning workflow (L3 #60)
#
# Runs TruffleHog on every push and a daily cron, posts the findings as a
# workflow summary. The container image (trufflesecurity/trufflehog) is
# pinned to a digest so the workflow is reproducible across runs and
# across forks.
#
# Triggers:
#   * push (all branches)        — scans the full history on every push
#   * pull_request               — scans the full history on every PR
#   * schedule (daily 06:00 UTC) — backstop, in case push is missed
#   * workflow_dispatch          — manual trigger from the Actions tab
#
# Behavior:
#   * Uses --fail so the workflow exits non-zero on verified secrets
#   * Uses --no-verification only when explicitly opted in via
#     the `no_verification` workflow_dispatch input (default: false)
#   * Posts the JSON output to $GITHUB_STEP_SUMMARY so findings show up
#     inline in the Actions UI without leaking them to a public artifact
# ---------------------------------------------------------------------------

on:
  push:
    branches:
      - "**"
  pull_request:
  schedule:
    # Daily 06:00 UTC backstop — covers branches that have been force-pushed
    # or pushed outside the normal PR flow, and catches credentials that
    # become public in between pushes (e.g. via a misconfigured mirror).
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      no_verification:
        description: "Skip verification (faster, but higher false-positive rate)"
        required: false
        type: boolean
        default: false
      extra_paths:
        description: "Additional paths to scan (space-separated, default: entire repo)"
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trufflehog:
    name: TruffleHog secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Pin the container digest for reproducibility. The image is
      # maintained by Truffle Security Inc. and the digest below corresponds
      # to the latest stable release of the public TruffleHog Docker image
      # at the time this workflow was authored. Override via the
      # TRUFFLEHOG_IMAGE env var on a fork if a newer digest is desired.
      TRUFFLEHOG_IMAGE: trufflesecurity/trufflehog:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history is required for `--since-commit` and the default
          # full-history scan. fetch-depth: 0 disables shallow clones.
          fetch-depth: 0

      - name: Resolve allowlist path
        id: allowlist
        run: |
          # The baseline allowlist lives in pheno-secret-scan/.trufflehog-allowlist.txt
          # so the secret-scan crate is self-contained; fall back to the
          # repository root if a consumer moves it (e.g. while inlining
          # the workflow).
          if [ -f pheno-secret-scan/.trufflehog-allowlist.txt ]; then
            echo "path=pheno-secret-scan/.trufflehog-allowlist.txt" >> "$GITHUB_OUTPUT"
          elif [ -f .trufflehog-allowlist.txt ]; then
            echo "path=.trufflehog-allowlist.txt" >> "$GITHUB_OUTPUT"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
            echo "::notice::No TruffleHog allowlist found; scanning without --allow-verification-overrides"
          fi

      - name: Run TruffleHog (full history, JSON output to summary)
        shell: bash
        run: |
          set -euo pipefail

          # Build the --directory flags. Default is the entire repo; the
          # `extra_paths` workflow_dispatch input lets a runner narrow or
          # widen the scan for ad-hoc runs.
          DIR_FLAGS=( "--directory=." )
          if [ -n "${{ inputs.extra_paths }}" ]; then
            DIR_FLAGS=()
            for p in ${{ inputs.extra_paths }}; do
              DIR_FLAGS+=( "--directory=${p}" )
            done
          fi

          # Build the --allow-verification-overrides flag if an allowlist
          # exists. TruffleHog reads detector IDs (one per line) from
          # this file and skips matching verified findings.
          ALLOW_FLAG=()
          if [ -n "${{ steps.allowlist.outputs.path }}" ]; then
            ALLOW_FLAG=( "--allow-verification-overrides=${{ steps.allowlist.outputs.path }}" )
          fi

          # Build the --no-verification flag (opt-in via workflow_dispatch).
          NO_VERIFY_FLAG=()
          if [ "${{ inputs.no_verification }}" = "true" ]; then
            NO_VERIFY_FLAG=( "--no-verification" )
          fi

          echo "::group::TruffleHog invocation"
          echo "image:      ${TRUFFLEHOG_IMAGE}"
          echo "extra:      ${{ inputs.extra_paths }}"
          echo "no_verify:  ${{ inputs.no_verification }}"
          echo "allowlist:  ${{ steps.allowlist.outputs.path }}"
          echo "::endgroup::"

          # json-out=/dev/stdout: TruffleHog streams newline-delimited
          # JSON findings to stdout. We tee into a temp file so we can
          # both capture it for the summary and respect --fail semantics.
          TMP_FINDINGS="$(mktemp)"
          trap 'rm -f "${TMP_FINDINGS}"' EXIT

          # Use `docker run` so the runner pulls a pinned image regardless
          # of the host's pre-installed TruffleHog version. The mount
          # exposes the working directory at /repo inside the container.
          set +e
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/repo:ro" \
            -w /repo \
            "${TRUFFLEHOG_IMAGE}" \
            git file:///repo \
            --json \
            --no-update \
            --fail \
            "${DIR_FLAGS[@]}" \
            "${ALLOW_FLAG[@]}" \
            "${NO_VERIFY_FLAG[@]}" \
            1> "${TMP_FINDINGS}" 2> "${TMP_FINDINGS}.stderr"
          rc=$?
          set -e

          # Render the summary table. Each JSON object becomes one row
          # (or is summarized as `none` when the file is empty).
          {
            echo "# TruffleHog secret-scan summary"
            echo
            echo "**Commit:** \`${GITHUB_SHA}\`  "
            echo "**Ref:**    \`${GITHUB_REF}\`  "
            echo "**Event:**  \`${GITHUB_EVENT_NAME}\`  "
            echo "**Exit:**   \`${rc}\` (0 = clean, non-zero = verified finding)"
            echo
            echo "## Findings"
            echo
            if [ -s "${TMP_FINDINGS}" ]; then
              echo "| Detector | Source | Verified | Description |"
              echo "|----------|--------|----------|-------------|"
              # Extract the fields we care about with jq; fall back to
              # raw lines if jq isn't available in the runner image.
              if command -v jq >/dev/null 2>&1; then
                jq -r '"\(.DetectorName // "unknown")|\(.SourceMetadata.Data.Git.file // "?")|\(.Verified // false)|\((.Description // .DetectorDescription // "") | gsub("\\|"; "\\\\|") | gsub("\\n"; " "))"' "${TMP_FINDINGS}" \
                  | awk -F'|' '{ printf "| %s | %s | %s | %s |\n", $1, $2, $3, $4 }'
              else
                echo "| (raw) | (raw) | (raw) | (jq missing; showing first 400 chars of each finding) |"
                while IFS= read -r line; do
                  printf "| ? | ? | ? | %s |\n" "$(echo "${line}" | cut -c1-400)"
                done < "${TMP_FINDINGS}"
              fi
            else
              echo "_No findings._"
            fi
            echo
            echo "## Scanner stderr (truncated)"
            echo
            echo '```'
            head -c 2000 "${TMP_FINDINGS}.stderr" 2>/dev/null || echo "(no stderr captured)"
            echo
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

          # Honor --fail semantics: surface a non-zero exit to the
          # workflow run so PR checks and the schedule backstop both
          # turn red when a real secret is detected.
          if [ "${rc}" -ne 0 ] && [ -s "${TMP_FINDINGS}" ]; then
            echo "::error::TruffleHog found verified secret(s); see workflow summary for details."
            exit "${rc}"
          fi

          exit 0
