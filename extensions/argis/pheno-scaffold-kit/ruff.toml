# ruff.toml — pheno-scaffold-kit
#
# Per ADR-039 (pheno-flake refresh template), Python repos use `ruff.toml`
# in place of the Rust fleet's `deny.toml`. This file configures ruff as
# the single linter + formatter for the package and its rendered templates.
#
# See: https://docs.astral.sh/ruff/

target-version = "py310"
line-length = 100
extend-exclude = [".venv", "build", "dist", "templates", ".tox"]

[lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM", "RUF"]
ignore = ["E501"]

[lint.per-file-ignores]
"tests/*" = ["S101"]
"templates/**/*" = ["ALL"]

[format]
quote-style = "double"
indent-style = "space"
