# cargo-deny configuration for pheno-flags
# Pillar L20 (CVE schema in CI) — targets `cargo deny check` in CI
# See: https://embarkstudios.github.io/cargo-deny/

[advisories]
# RUSTSEC-2023-0071 (Marvin Attack on rsa) is unpatched; ignore until upstream
# releases a fix. Track: https://github.com/RustSec/advisory-db/issues/1410
ignore = [
    "RUSTSEC-2023-0071",  # rsa crate Marvin Attack (unpatched; no fleet impact — pheno-flags does not use rsa)
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
