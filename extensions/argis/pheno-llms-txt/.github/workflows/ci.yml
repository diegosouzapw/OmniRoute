name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: pytest
        run: pytest -q

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d # v5.3.0
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff>=0.4"
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  coverage:
    name: coverage (pytest-cov, 80% gate per ADR-040 lib tier)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d # v5.3.0
        with:
          python-version: "3.12"
      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: pytest --cov (80% gate)
        run: pytest --cov=pheno_llms_txt --cov-report=xml --cov-fail-under=80
      - name: Upload coverage
        uses: codecov/codecov-action@0565863a31f2c772f9f3b7eecb0d484b0d1e54c4 # v5.4.2
        with:
          files: coverage.xml
          fail_ci_if_error: false
