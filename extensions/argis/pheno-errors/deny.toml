# deny.toml — cargo-deny supply-chain policy for pheno-errors
#
# This file enforces allowed licenses, bans, and source registries
# for all transitive dependencies consumed by this crate. Mirror of
# the Phenotype-org standard deny policy.

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSD-3-Clause-Clear",
    "CC0-1.0",
    "CC-BY-SA-4.0",
    "GPL-3.0-only",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
    "BlueOak-1.0.0",
    "CDLA-Permissive-2.0",
    "Unlicense",
    "WTFPL",
]
confidence-threshold = 0.8

[sources]
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
unknown-git = "deny"
unknown-registry = "deny"

[advisories]
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []
