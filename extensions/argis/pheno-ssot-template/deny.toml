# cargo-deny configuration
#
# Baseline: derived from DENY_TOML_DIVERGENCE_2026_06_10.md. The
# conservative AuthKit baseline is the reference; the additional
# GPL-3.0-only / CC-BY-SA-4.0 / BSD-3-Clause-Clear set from
# FocalPoint is INTENTIONALLY OMITTED here so that the template ships
# with the strictest license floor and downstream repos can opt-in
# to the broader set via a follow-up PR if they need it.
#
# If you are copying this deny.toml into a new repo and need a more
# permissive set, see the Authvault-style additions documented in
# DENY_TOML_DIVERGENCE_2026_06_10.md and add them deliberately.
#
# Reference: V3 L3 #55 (pheno-ssot-template).
# See also: pheno-ssot-template/README.md.

[advisories]
db-path = "$CARGO_HOME/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "0BSD",
    "CC0-1.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
