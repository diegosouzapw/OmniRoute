name: OpenSSF Scorecard

on:
  schedule:
    - cron: '0 12 * * 1'  # every Monday 12:00 UTC
  push:
    branches: [main, master]
  workflow_dispatch:

# Declare default permissions as read-only.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # Needed to upload SARIF results to code-scanning dashboard.
      security-events: write
      # Needed to publish results and get a badge.
      id-token: write
      # Needed to fetch the repository contents.
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@dc50aa9510b46c811795eb24b2f1ba02a914e534  # v2.3.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@9e8d0789d4a0fa9ceb6b1738f7e269594bdd67f0  # v3
        with:
          sarif_file: results.sarif
