[project]
name = "promptadapter"
version = "0.1.0"
description = "DSPy-based prompt adaptation service for cross-model optimization"
requires-python = ">=3.10"
dependencies = [
    "dspy-ai>=2.5.0",
    "fastapi>=0.115.0",
    "uvicorn>=0.32.0",
    "pydantic>=2.0.0",
    "httpx>=0.27.0",
    "openai>=1.50.0",
    "anthropic>=0.37.0",
    "tiktoken>=0.8.0",
    "numpy>=1.26.0",
    "redis>=5.0.0",
    "structlog>=24.0.0",
    "datasets>=3.0.0",  # HuggingFace datasets for public data
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.7.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]

