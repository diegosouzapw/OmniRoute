apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: omniroute-scaled-object
  namespace: omniroute-fleet
  labels:
    app.kubernetes.io/name: omniroute
    app.kubernetes.io/component: fleet
spec:
  scaleTargetRef:
    name: omniroute
  pollingInterval: 15
  cooldownPeriod: 60
  minReplicaCount: 2
  maxReplicaCount: 20
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Percent
              value: 50
              periodSeconds: 60
        scaleUp:
          stabilizationWindowSeconds: 60
          policies:
            - type: Pods
              value: 4
              periodSeconds: 15
            - type: Percent
              value: 100
              periodSeconds: 15
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-operated.monitoring:9090
        metricName: omniroute_queue_depth
        query: |
          sum(rate(omniroute_requests_inflight_total[30s]))
        threshold: "100"
        activationThreshold: "10"
    - type: cpu
      metadata:
        type: Utilization
        value: "70"
    - type: memory
      metadata:
        type: Utilization
        value: "80"
