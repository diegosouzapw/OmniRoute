[package]
name = "omniroute-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "OmniRoute CLI: start, stop, status, config, db migrate, doctor, version, serve."

[[bin]]
name = "omniroute"
path = "src/main.rs"

[[bin]]
name = "omniroute-reset-password"
path = "src/bin/reset_password.rs"

[dependencies]
omniroute-core = { workspace = true }
